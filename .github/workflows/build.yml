name: Build

on:
  pull_request: {}
  workflow_dispatch: {}

permissions:
  actions: none
  contents: none

jobs:
  build:
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-latest
    env:
      # mise >= 2026.6 defaults minimum_release_age to 24h (supply-chain
      # guard). Its pipx backend forwards pip's --uploaded-prior-to flag into
      # the shared-library bootstrap, which the bootstrap pip rejects, breaking
      # all pipx tool installs. Disable the delay to restore working builds.
      MISE_MINIMUM_RELEASE_AGE: "0s"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true

      - name: Build
        run: mise run build

      - name: Find mutations
        id: self_mutation
        run: |-
          git add .
          git diff --staged --patch --exit-code > repo.patch || echo "self_mutation_happened=true" >> $GITHUB_OUTPUT
        shell: bash

      - name: Upload patch
        if: steps.self_mutation.outputs.self_mutation_happened
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repo.patch
          path: repo.patch
          overwrite: true

      - name: Fail build on mutation
        if: steps.self_mutation.outputs.self_mutation_happened
        run: |-
          echo "::error::Files were changed during build (see build log). Please run the build locally and commit the changes."
          cat repo.patch
          exit 1
