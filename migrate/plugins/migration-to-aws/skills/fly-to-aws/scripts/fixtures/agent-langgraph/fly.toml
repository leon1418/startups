app = "agent-app"
primary_region = "iad"
[processes]
  web = "python -m app.web"
  agent = "python -m app.agent"
[http_service]
  internal_port = 8080
  processes = ["web"]
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
[[vm]]
  size = "performance-1x"
  processes = ["agent"]
