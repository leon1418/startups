app = "multi"
primary_region = "iad"
[processes]
  web = "python -m app.web"
  worker = "python -m app.worker"
  nightly = "python -m app.nightly"
[http_service]
  internal_port = 8080
  processes = ["web"]
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
[[restart]]
  policy = "never"
  processes = ["nightly"]
[[vm]]
  size = "performance-1x"
  processes = ["worker"]
