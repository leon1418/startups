# mise.toml - Tool versions and tasks for awslabs/startups
# See: https://mise.jdx.dev

min_version = "2026.2.4"

[tools]
node = "24"
"npm:markdownlint-cli2" = "0.17"
"npm:dprint" = "0.51"
"npm:typescript" = "5"
"pipx:pre-commit" = "4"
"pipx:bandit[sarif]" = "1"
"pipx:checkov" = "3"
"pipx:semgrep" = "1.151.0"
"grype" = "0.107.1"
"gitleaks" = "8.30.0"

# ==================
# ROOT LEVEL TASKS
# ==================

[tasks.pre-commit]
description = "Run pre-commit"
run = ["pre-commit run --all-files"]

# ======================
# LINTING & FORMATTING
# ======================

[tasks.fmt]
description = "Format all files"
run = "dprint fmt"

[tasks."fmt:check"]
description = "Check formatting (CI)"
run = "dprint check"

[tasks."lint:md"]
description = "Lint Markdown files"
run = "markdownlint-cli2 '**/*.md' '#node_modules' '#.git'"

[tasks."lint:md:fix"]
description = "Lint Markdown files with auto-fix"
run = "markdownlint-cli2 '**/*.md' '#node_modules' --fix"

[tasks."lint:frontmatter"]
description = "Validate phase/fragment/assembler frontmatter (typed, zero-dep; skill-agnostic)"
run = [
  "node migrate/plugins/migration-to-aws/tools/frontmatter-validator/validate.ts migrate/plugins/migration-to-aws/skills/heroku-to-aws",
  "node migrate/plugins/migration-to-aws/tools/frontmatter-validator/validate.ts migrate/plugins/migration-to-aws/skills/fly-to-aws",
  "node migrate/plugins/migration-to-aws/tools/frontmatter-validator/validate.ts migrate/plugins/migration-to-aws/skills/agent-advisor",
]

[tasks."lint:types"]
description = "Type-check the frontmatter validator + its test (tsc --noEmit, strict)"
run = "cd migrate/plugins/migration-to-aws && tsc --noEmit"

[tasks.test]
description = "Run the frontmatter-validator test suite (node --test)"
run = "node --test migrate/plugins/migration-to-aws/tests/tools/frontmatter-validator.test.ts"

[tasks."shared:sync"]
description = "Sync each skill's references/vendored/ tree from the canonical skills/shared/ source"
run = "node migrate/plugins/migration-to-aws/tools/sync-vendored-shared.ts --write"

[tasks."shared:check"]
description = "Verify each skill's vendored shared files are byte-identical to canonical skills/shared/ (CI)"
run = "node migrate/plugins/migration-to-aws/tools/sync-vendored-shared.ts"

[tasks.lint]
description = "Run all linters"
run = [
  { task = "lint:md" },
  { task = "lint:types" },
  { task = "lint:frontmatter" },
  { task = "shared:check" },
  { task = "test" },
]

# =========
# SECURITY
# =========

[tasks."security:bandit"]
description = "Run Bandit (two-pass: migration-to-aws plugin with its own skip config; rest of repo with full strictness — mirrors the CI bandit job in .github/workflows/security-scanners.yml)"
run = [
  "bandit -r migrate/plugins/migration-to-aws -c migrate/plugins/migration-to-aws/bandit.yml -x ./migrate/plugins/migration-to-aws/skills/agent-advisor/scripts/.venv,./migrate/plugins/migration-to-aws/skills/fly-to-aws/scripts/.venv,./migrate/plugins/migration-to-aws/skills/llm-to-bedrock/scripts/.venv",
  "bandit -r . --exclude ./.tmp,./node_modules,./migrate/plugins/migration-to-aws",
]

[tasks."security:semgrep"]
description = "Run SemGrep OSS"
run = [
  "semgrep scan --quiet --oss-only --metrics=off --config=r/all --max-log-list-entries=0 --exclude-rule='ai.generic.detect-generic-ai-anthprop.detect-generic-ai-anthprop' --exclude-rule='ai.generic.detect-generic-ai-oai.detect-generic-ai-oai'",
]

[tasks."security:checkov"]
description = "Run Checkov"
run = ["checkov --quiet --directory ."]

[tasks."security:gitleaks"]
description = "Run GitLeaks"
run = ["gitleaks git --config=.gitleaks.toml --baseline-path=.gitleaks-baseline.json"]

[tasks."security:grype"]
description = "Run Grype"
run = ["grype ."]

[tasks.security]
description = "Run security scans"
run = [
  { task = "security:bandit" },
  { task = "security:semgrep" },
  { task = "security:gitleaks" },
  { task = "security:checkov" },
  { task = "security:grype" },
]

# ===============
# BUILD PROCESS
# ===============

[tasks.build]
description = "Complete build: lint, format, security scans"
run = [
  { task = "lint" },
  { task = "fmt:check" },
  { task = "security" },
]
